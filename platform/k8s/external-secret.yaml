# Reuses the ClusterSecretStore defined in
# kubernetes/external-secrets/secret-store.yaml at the repo root - this
# platform is a workload running on that landing zone's EKS cluster, not a
# separately-secured system. No credential below is ever committed as a
# plaintext manifest; each key is sourced from AWS Secrets Manager at
# slz-prod/attack-surface-monitor/*.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: attack-surface-monitor-secrets
  namespace: attack-surface-monitor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: attack-surface-monitor-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: slz-prod/attack-surface-monitor/database
        property: url
    - secretKey: HIBP_API_KEY
      remoteRef:
        key: slz-prod/attack-surface-monitor/hibp
        property: api_key
    - secretKey: SMTP_HOST
      remoteRef:
        key: slz-prod/attack-surface-monitor/smtp
        property: host
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: slz-prod/attack-surface-monitor/smtp
        property: username
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: slz-prod/attack-surface-monitor/smtp
        property: password
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: slz-prod/attack-surface-monitor/slack
        property: webhook_url
