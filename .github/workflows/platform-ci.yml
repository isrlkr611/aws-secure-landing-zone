name: Platform CI (Attack Surface Monitor)

# CI for platform/ - the FastAPI attack-surface-monitoring service that
# runs as a workload on top of this repo's landing zone. Separate from
# terraform-security-scan.yml (infra) and image-scan-trivy.yml (generic
# app image template) because this is the one component in the repo with
# real Python source and a real Dockerfile to lint/test/scan.

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  push:
    branches: [main]
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  lint-and-test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: platform/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Pytest
        run: pytest tests/ -v
        env:
          # Every test uses an in-memory SQLite DB and mocks all outbound
          # calls (see tests/conftest.py) - no network access, no real
          # scans, safe to run unattended in CI.
          DATABASE_URL: "sqlite:///:memory:"

  build-and-scan-image:
    name: Build image + Trivy scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t attack-surface-monitor-api:${{ github.sha }} .

      # trivy-action is a composite action - it does NOT inherit this job's
      # `defaults.run.working-directory: platform` (that only applies to
      # `run:` steps in this workflow file itself), so every path below is
      # given relative to the repo root, not platform/.
      - name: Scan image with Trivy (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: attack-surface-monitor-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          # Documented, CVE-by-CVE accepted risk in the subfinder binary's
          # embedded Go deps - see platform/.trivyignore and
          # platform/README.md "Container image scan results". A NEW CVE
          # not already in that file still correctly fails this step.
          trivyignores: platform/.trivyignore

      - name: Scan again for SARIF report (non-blocking, for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: attack-surface-monitor-api:${{ github.sha }}
          format: sarif
          output: trivy-platform-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          # No trivyignores here on purpose: the Security tab should still
          # show the accepted subfinder findings for visibility/tracking,
          # even though they don't fail the build above.

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-platform-results.sarif

  kubernetes-manifests:
    name: kubeconform (platform/k8s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate manifests
        run: |
          kubeconform -strict -ignore-missing-schemas -summary \
            $(find platform/k8s/ -name '*.yaml')
