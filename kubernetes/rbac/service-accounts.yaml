apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    # Bound to the narrowly-scoped IRSA role created in
    # terraform/environments/prod/main.tf (aws_iam_role.external_secrets_irsa)
    # via the EKS OIDC provider - replace ACCOUNT_ID / NAME_PREFIX with the
    # `external_secrets_irsa_role_arn` Terraform output.
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/NAME_PREFIX-external-secrets-irsa"
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-workload
  namespace: app
# No IAM role annotation: this application does not talk to AWS APIs
# directly, so it gets no AWS credentials at all - not even implicitly via
# the node role, since IRSA + no annotation means the pod gets nothing.
automountServiceAccountToken: false
