apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-developers-binding
  namespace: app
subjects:
  # Bound to an IAM-mapped group via aws-auth / EKS access entries
  # (group "app-developers"), not to individually-named users, so
  # onboarding/offboarding is a group membership change, not a manifest edit.
  - kind: Group
    name: app-developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: app-developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-readonly-binding
  namespace: app
subjects:
  - kind: Group
    name: app-readonly
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: app-readonly
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets-operator-binding
  namespace: app
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
roleRef:
  kind: Role
  name: external-secrets-operator
  apiGroup: rbac.authorization.k8s.io
