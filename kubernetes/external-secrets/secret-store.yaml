# Requires the External Secrets Operator installed in-cluster first:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# ClusterSecretStore points at AWS Secrets Manager and authenticates via the
# external-secrets ServiceAccount's IRSA role (see
# kubernetes/rbac/service-accounts.yaml) - no AWS access keys stored
# anywhere in the cluster.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-3
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
