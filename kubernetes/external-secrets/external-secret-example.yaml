# Declares "app namespace needs a Secret called db-credentials, sourced from
# AWS Secrets Manager secret slz-prod/app/db-credentials" - the actual
# secret VALUE never appears in this repo, in a manifest, or in git history.
# The operator polls Secrets Manager every refreshInterval and reconciles
# the Kubernetes Secret automatically, including on rotation.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: slz-prod/app/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: slz-prod/app/db-credentials
        property: password
