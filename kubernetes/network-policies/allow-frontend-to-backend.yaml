# Illustrates east-west segmentation between two tiers of the same app:
# only pods labeled tier=frontend may reach tier=backend on its app port.
# Nothing else in the namespace (or cluster) can, even though they share a
# namespace - segmentation here is by pod label, not just namespace boundary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: app
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - protocol: TCP
          port: 8080
